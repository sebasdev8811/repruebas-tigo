<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Tigo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #003d82 0%, #0052b4 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo { font-size: 48px; font-weight: bold; color: #003d82; margin-bottom: 20px; }
        h1 { font-size: 22px; color: #003d82; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #003d82; }
        button {
            width: 100%;
            padding: 14px;
            background: #003d82;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #0052b4; }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">tigo</div>
        <h1>Restablecer Contraseña</h1>
        <p>Ingresa tu nueva contraseña</p>

        <div id="message" class="message"></div>

        <div id="formSection">
            <div class="form-group">
                <label>Nueva contraseña</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button onclick="resetPassword()">RESTABLECER CONTRASEÑA</button>
        </div>

        <div id="successSection" style="display:none;">
            <p style="margin-bottom:20px;">Tu contraseña fue restablecida exitosamente.</p>
            <button onclick="window.location.href='index.html'">IR AL LOGIN</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        function getTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }

        async function resetPassword() {
            const token = getTokenFromURL();
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (!token) {
                showMessage('❌ Token inválido o expirado.', 'error');
                return;
            }

            if (!newPassword || !confirmPassword) {
                showMessage('❌ Completa todos los campos.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('❌ Las contraseñas no coinciden.', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('❌ La contraseña debe tener al menos 6 caracteres.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password_nuevo: newPassword })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(`❌ ${data.detail || 'Error al restablecer'}`, 'error');
                    return;
                }

                document.getElementById('formSection').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';
                showMessage('✅ Contraseña restablecida exitosamente.', 'success');

            } catch (error) {
                showMessage('❌ Error de conexión. Intenta de nuevo.', 'error');
            }
        }

        // Verificar que hay token en la URL
        window.onload = function() {
            const token = getTokenFromURL();
            if (!token) {
                showMessage('❌ Enlace inválido. Solicita uno nuevo.', 'error');
                document.getElementById('formSection').style.display = 'none';
            }
        };
    </script>
</body>
</html>
